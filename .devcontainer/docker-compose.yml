services:
  app:
    image: mcr.microsoft.com/devcontainers/typescript-node:1-22-bookworm
    volumes:
      - ..:/workspaces/football-cup-prediction:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cup_prediction
      AUTH_SECRET: dev-auth-secret-at-least-32-chars!!
      AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_dev_placeholder

  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cup_prediction
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cup_prediction']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
